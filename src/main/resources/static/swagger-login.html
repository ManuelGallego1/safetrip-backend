<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeTrip API - Login Admin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 30px;
            text-align: center;
            color: white;
        }

        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .login-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .admin-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 600;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .alert-error {
            background: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-note {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 13px;
            background: #f8f9fa;
        }

        .api-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-header">
        <div class="api-icon">🔐</div>
        <h1>SafeTrip API</h1>
        <p>Acceso a Documentación Swagger</p>
        <div class="admin-badge">🛡️ Solo Administradores</div>
    </div>

    <div class="login-body">
        <div id="alertContainer"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">📧 Correo Electrónico</label>
                <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="admin@safetrip.com"
                        required
                        autocomplete="username"
                >
            </div>

            <div class="form-group">
                <label for="password">🔑 Contraseña</label>
                <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        required
                        autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                Acceder a Swagger
            </button>
        </form>
    </div>

    <div class="footer-note">
        🛡️ Acceso restringido: Solo usuarios con rol ADMIN
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const alertContainer = document.getElementById('alertContainer');

    window.addEventListener('DOMContentLoaded', () => {
        const token = sessionStorage.getItem('swagger_jwt_token');
        const role = sessionStorage.getItem('swagger_user_role');

        if (token && role === 'ADMIN') {
            showAlert('Ya tienes una sesión activa. Redirigiendo...', 'success');
            setTimeout(() => {
                window.location.href = '/swagger-ui.html';
            }, 1000);
        } else if (token && role !== 'ADMIN') {
            // Limpiar sesión si no es admin
            sessionStorage.clear();
            document.cookie = 'swagger_auth_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
            showAlert('⚠️ Tu sesión anterior no tiene permisos de administrador', 'warning');
        }
    });

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        // Deshabilitar botón y mostrar loading
        loginBtn.disabled = true;
        loginBtn.innerHTML = '<span class="loading"></span>Autenticando...';
        alertContainer.innerHTML = '';

        try {
            const response = await fetch(`${API_URL}/api/auth/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok && result.status === 'success' && result.data) {
                const token = result.data.token;
                const role = result.data.person?.role || result.data.role || 'USER';

                if (!token) {
                    showAlert('❌ Token no recibido del servidor', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Acceder a Swagger';
                    return;
                }

                if (role !== 'ADMIN') {
                    showAlert('🚫 Acceso Denegado: Solo usuarios ADMIN pueden acceder a Swagger', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = 'Acceder a Swagger';

                    sessionStorage.clear();
                    document.cookie = 'swagger_auth_token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
                    return;
                }

                sessionStorage.setItem('swagger_jwt_token', token);
                sessionStorage.setItem('swagger_user_role', role);
                sessionStorage.setItem('swagger_user_email', email);

                document.cookie = `swagger_auth_token=${token}; path=/; SameSite=Strict`;

                showAlert(`✅ Login exitoso! Bienvenido Admin`, 'success');

                setTimeout(() => {
                    window.location.href = '/swagger-ui.html';
                }, 1000);

            } else {
                showAlert('❌ ' + (result.message || 'Credenciales inválidas'), 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = 'Acceder a Swagger';
            }
        } catch (error) {
            console.error('Error de login:', error);
            showAlert('❌ Error de conexión. Verifica que el servidor esté activo.', 'error');
            loginBtn.disabled = false;
            loginBtn.innerHTML = 'Acceder a Swagger';
        }
    });

    function showAlert(message, type) {
        alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    ${message}
                </div>
            `;
    }

    document.getElementById('email').value = '';
    document.getElementById('password').value = '';
</script>
</body>
</html>
